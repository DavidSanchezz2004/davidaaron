<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 230px;
        padding: 14px 16px;
        font-family: "Segoe UI", sans-serif;
        font-size: 13px;
        margin: 0;
        background: #fff;
      }
      h3 {
        margin: 0 0 6px;
        color: #1a73e8;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #34a853;
        display: inline-block;
        flex-shrink: 0;
      }
      p {
        margin: 4px 0;
        color: #5f6368;
        line-height: 1.4;
      }
      hr {
        border: none;
        border-top: 1px solid #e8eaed;
        margin: 10px 0;
      }
      .hint {
        font-size: 11px;
        color: #9aa0a6;
      }
      .brand {
        margin-top: 10px;
        font-size: 11px;
        color: #9aa0a6;
        text-align: center;
      }
      .brand a {
        color: #1a73e8;
        font-weight: 700;
        text-decoration: none;
      }
      .brand a:hover {
        text-decoration: underline;
      }
      .logo {
        display: block;
        width: 120px;
        margin: 0 auto 10px;
      }
    </style>
  </head>
  <body>
    <img
      src="https://mscontables.com/LogoMendietav2.jpg"
      class="logo"
      alt="Mendieta"
    />
    <h3><span class="dot"></span> Mendieta - Acceso SUNAT</h3>
    <p>Extensión activa y lista.</p>
    <hr />
    <p class="hint">
      Cuando el Portal Mendieta abra una sesión SUNAT,<br />
      esta extensión gestiona el acceso automáticamente.
    </p>
    <hr />
    <p class="brand">
      Desarrollado por<br /><a href="https://mscontables.com/" target="_blank"
        >mscontables.com</a
      >
    </p>
  </body>
</html>
