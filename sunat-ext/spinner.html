<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Conectando con SUNAT...</title>
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #1f2e50;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 40px 48px;
        text-align: center;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
        max-width: 400px;
        width: 90%;
      }
      .sp {
        width: 44px;
        height: 44px;
        border: 4px solid #e0e0e0;
        border-top-color: #1a73e8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 20px;
      }
      .sp.hidden {
        display: none;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      h2 {
        margin: 0 0 8px;
        color: #1a1a1a;
        font-size: 20px;
      }
      p {
        color: #666;
        font-size: 14px;
        margin: 4px 0;
      }
      .btn {
        background: #d97706;
        color: #fff;
        padding: 12px 28px;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        width: 100%;
        margin-top: 20px;
        display: none;
      }
      .btn:hover {
        background: #b45309;
      }
      .error h2 {
        color: #b91c1c;
      }
      .logo {
        width: 160px;
        margin: 0 auto 18px;
        display: block;
      }
      .divider {
        border: none;
        border-top: 1px solid #e8e8e8;
        margin: 22px 0 16px;
      }
      .brand {
        font-size: 13px;
        color: #888;
        margin: 0 0 4px;
        font-weight: 500;
      }
      .brand-link {
        display: inline-block;
        margin-top: 4px;
        font-size: 15px;
        font-weight: 700;
        color: #1a73e8;
        text-decoration: none;
        letter-spacing: 0.3px;
      }
      .brand-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card" id="card">
      <img id="logo" src="" class="logo" alt="Mendieta" />
      <div class="sp" id="spinner"></div>
      <h2 id="msg">Conectando con SUNAT...</h2>
      <p id="sub">Iniciando sesión</p>
      <button class="btn" id="closeBtn" onclick="window.close()">
        Cerrar esta pestaña
      </button>
      <hr class="divider" />
      <p class="brand">Desarrollado por</p>
      <a class="brand-link" href="https://mscontables.com/" target="_blank">mscontables.com</a>
    </div>
    <script src="spinner.js"></script>
  </body>
</html>
